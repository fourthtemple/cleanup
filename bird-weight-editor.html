<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixamo Cleanup Tool</title>
    <link rel="stylesheet" href="./src/animation-viewer.css" />
  </head>
  <body>
    <main class="viewer-app editor-app weight-editor-app is-side-panel-open is-timeline-compact">
      <aside class="viewer-panel editor-control-panel" aria-label="Bird weight editor controls">
        <header class="viewer-header">
          <button id="side-panel-toggle" class="panel-collapse-toggle" type="button" aria-label="Hide panel" title="Hide panel" aria-pressed="true">-</button>
          <div>
            <p class="viewer-kicker">Open Source</p>
            <h1>Mixamo Cleanup</h1>
          </div>
        </header>

        <section class="viewer-section animation-side-section weight-animation-section">
          <span class="viewer-label">Animation</span>
          <label class="viewer-field">
            <span>Character</span>
            <select id="weight-character-select"></select>
          </label>
          <label class="viewer-field">
            <span>Animation</span>
            <select id="weight-action-select"></select>
          </label>
          <div class="viewer-actions import-actions">
            <button id="import-animation-file-button" type="button">Load</button>
          </div>
          <input id="import-animation-file" type="file" accept=".fbx,.glb,.gltf" hidden />
          <div class="viewer-actions export-actions">
            <button id="export-glb-button" type="button" disabled>Export GLB</button>
          </div>
          <div class="viewer-checks import-options">
            <label><input id="use-timeline-keys" name="edit-source-mode" type="radio" value="solved" /> Use solved keys</label>
            <label><input id="adaptive-edit-mode" name="edit-source-mode" type="radio" value="adaptive" checked /> Adaptive edits</label>
          </div>
          <label class="viewer-field">
            <span>Key Detail</span>
            <div class="viewer-range-row">
              <input id="solved-key-detail" type="range" min="0" max="1" step="0.05" value="0.2" />
              <output id="solved-key-detail-output">20%</output>
            </div>
          </label>
          <label class="viewer-field timeline-blend-action-field">
            <span>Blend To</span>
            <select id="timeline-blend-action-select"></select>
          </label>
          <div class="viewer-actions">
            <button id="play-toggle" type="button">Play</button>
            <button id="restart-clip" type="button">Restart</button>
          </div>
          <label class="viewer-field">
            <span>Time</span>
            <input id="time-scrub" type="range" min="0" max="1" step="0.001" value="0" />
          </label>
          <label class="viewer-field">
            <span>End Blend</span>
            <div class="viewer-range-row">
              <input id="timeline-blend-control" type="range" min="0.05" max="2" step="0.05" value="0.35" />
              <output id="timeline-blend-output">0.35s</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Speed</span>
            <div class="viewer-range-row">
              <input id="speed-control" type="range" min="0" max="2" step="0.05" value="1" />
              <output id="weight-speed-output">1.00</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Scale</span>
            <div class="viewer-range-row">
              <input id="weight-scale-control" type="range" min="-3.3" max="0.20412" step="0.01" value="0" data-scale-mode="log" data-preview-scale-min="0.0005" data-preview-scale-max="1.6" />
              <output id="weight-scale-output">1.00x</output>
            </div>
          </label>
          <div class="viewer-checks animation-loop-options">
            <label><input id="loop-toggle" type="checkbox" checked /> Loop</label>
            <label><input id="travel-loop-toggle" type="checkbox" /> Travel</label>
            <label class="travel-follow-option is-hidden"><input id="travel-follow-toggle" type="checkbox" checked /> Follow</label>
          </div>
          <div class="viewer-checks animation-display-options">
            <label><input id="skeleton-toggle" type="checkbox" /> Bones</label>
            <label><input id="bone-label-toggle" type="checkbox" /> Labels</label>
          </div>
        </section>

        <section class="viewer-section">
          <span class="viewer-label">Paint</span>
          <label class="viewer-field">
            <span>Brush radius</span>
            <input id="brush-radius" type="range" min="0.004" max="0.18" step="0.002" value="0.035" />
          </label>
          <div class="viewer-checks">
            <label><input id="through-selection-toggle" type="checkbox" /> Through</label>
          </div>
          <label class="viewer-field">
            <span>Push/Pull step</span>
            <div class="viewer-range-row">
              <input id="sculpt-strength" type="range" min="0.0002" max="0.012" step="0.0002" value="0.002" />
              <output id="sculpt-strength-output">0.002</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Move scale</span>
            <div class="viewer-range-row">
              <input id="move-sensitivity" type="range" min="0.05" max="1" step="0.05" value="0.25" />
              <output id="move-sensitivity-output">0.25</output>
            </div>
          </label>
          <div class="viewer-actions">
            <button id="clear-selection" type="button">Clear Selection</button>
            <button id="clear-all-selection" type="button">Reset All</button>
          </div>
          <button id="invert-selection" type="button">Invert Selection</button>
        </section>

        <section class="viewer-section rig-bone-panel">
          <div class="rig-bone-heading">
            <span class="viewer-label">Rig</span>
            <button id="rig-panel-toggle" type="button" aria-expanded="true">-</button>
          </div>
          <div id="rig-panel-body" class="rig-panel-body">
            <div class="rig-bone-create" aria-label="Custom bone editor">
              <label class="viewer-field rig-bone-wide">
                <span>Parent</span>
                <select id="add-bone-parent-select"></select>
              </label>
              <label class="viewer-field rig-bone-wide">
                <span>Bone name</span>
                <input id="add-bone-name" type="text" value="NewBone" autocomplete="off" />
              </label>
              <label class="viewer-field">
                <span>Local X</span>
                <input id="add-bone-pos-x" type="number" step="0.01" value="0" />
              </label>
              <label class="viewer-field">
                <span>Local Y</span>
                <input id="add-bone-pos-y" type="number" step="0.01" value="-0.12" />
              </label>
              <label class="viewer-field">
                <span>Local Z</span>
                <input id="add-bone-pos-z" type="number" step="0.01" value="0" />
              </label>
              <label class="viewer-field">
                <span>Rot X</span>
                <input id="add-bone-rot-x" type="number" step="0.01" value="0" />
              </label>
              <label class="viewer-field">
                <span>Rot Y</span>
                <input id="add-bone-rot-y" type="number" step="0.01" value="0" />
              </label>
              <label class="viewer-field">
                <span>Rot Z</span>
                <input id="add-bone-rot-z" type="number" step="0.01" value="0" />
              </label>
              <div class="viewer-grid-actions rig-bone-actions">
                <button id="place-bone-selection" type="button" title="Click Create, then click a visible bone joint as the parent">Create</button>
                <button id="update-bone" type="button" title="Move the selected custom bone without posing the animation">Move</button>
                <button id="delete-bone" type="button">Delete</button>
              </div>
              <label class="viewer-field rig-bone-chain-members">
                <span>Chain bones</span>
                <select id="add-bone-chain-members" multiple size="5"></select>
              </label>
              <div class="rig-pose-clipboard-actions" aria-label="Chain pose clipboard">
                <button id="copy-pose" type="button" title="Copy selected bone or chain pose at the current frame">Copy</button>
                <button id="paste-pose" type="button" title="Paste copied pose to the current frame" disabled>Paste</button>
              </div>
              <button id="add-bone-chain" class="rig-bone-chain-action" type="button">Add Chain</button>
            </div>
          </div>
        </section>

        <section class="viewer-section">
          <span class="viewer-label">Assign Weight</span>
          <label class="viewer-field">
            <span>Bone</span>
            <select id="bone-select"></select>
          </label>
          <label class="viewer-field">
            <span>Bone chain</span>
            <select id="bone-chain-select"></select>
          </label>
          <label class="viewer-field">
            <span>Bone influence</span>
            <div class="viewer-range-row">
              <input id="weight-value" type="range" min="0" max="1" step="0.01" value="0.2" />
              <output id="weight-value-output">0.20</output>
            </div>
          </label>
          <div class="viewer-grid-actions weight-actions">
            <button id="apply-weight" type="button">Set Weight</button>
            <button id="commit-weight" type="button">Commit Weight</button>
            <button id="remove-weight" type="button">De-weight</button>
            <button id="reset-weights" type="button">Reset Weights</button>
            <button id="redistribute-chain-weights" type="button">Distribute Chain</button>
          </div>
          <div class="selection-influence-panel" aria-label="Selected vertex influences">
            <span class="viewer-label">Selection Influence</span>
            <div id="selection-influence-list" class="selection-influence-list"></div>
          </div>
          <textarea id="weight-json" class="editor-json weight-json" spellcheck="false" hidden></textarea>
          <input id="patch-file-input" type="file" accept=".json,application/json" hidden />
          <button id="copy-patch" type="button" hidden>Copy</button>
          <button id="apply-patch-json" type="button" hidden>Apply JSON</button>
          <div class="viewer-grid-actions cleanup-actions">
            <button id="load-patch" type="button">Load Cleanup</button>
            <button id="repair-seams" type="button">Repair Seams</button>
            <button id="clear-patch" type="button">Reset Cleanup</button>
          </div>
        </section>

        <section class="viewer-section">
          <span class="viewer-label">Camera</span>
          <div class="viewer-grid-actions camera-view-actions" role="group" aria-label="Camera views">
            <button type="button" data-camera="front">Front</button>
            <button type="button" data-camera="back">Back</button>
            <button type="button" data-camera="right">Right</button>
            <button type="button" data-camera="left">Left</button>
            <button type="button" data-camera="top">Top</button>
          </div>
          <div class="viewer-grid-actions camera-roll-actions" role="group" aria-label="Camera roll">
            <button id="camera-roll-left" type="button" title="Roll camera counter-clockwise 90 degrees">Roll -90</button>
            <button id="camera-roll-reset" type="button" title="Reset camera roll upright">Upright</button>
            <button id="camera-roll-right" type="button" title="Roll camera clockwise 90 degrees">Roll +90</button>
          </div>
          <label class="viewer-field">
            <span>Gizmo Speed</span>
            <div class="viewer-range-row">
              <input id="camera-gizmo-speed" type="range" min="0.0005" max="0.02" step="0.0001" value="0.0052" />
              <output id="camera-gizmo-speed-output">0.0052</output>
            </div>
          </label>
          <label class="viewer-field camera-color-field">
            <span>Background</span>
            <input id="camera-background-color" type="color" value="#11171c" />
          </label>
          <label class="viewer-field">
            <span>Ambient</span>
            <div class="viewer-range-row">
              <input id="camera-ambient-light" type="range" min="0" max="3" step="0.05" value="0.75" />
              <output id="camera-ambient-light-output">0.75</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Key</span>
            <div class="viewer-range-row">
              <input id="camera-key-light" type="range" min="0" max="4" step="0.05" value="1.25" />
              <output id="camera-key-light-output">1.25</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Rim</span>
            <div class="viewer-range-row">
              <input id="camera-rim-light" type="range" min="0" max="2" step="0.05" value="0.35" />
              <output id="camera-rim-light-output">0.35</output>
            </div>
          </label>
          <label class="viewer-field">
            <span>Texture</span>
            <div class="viewer-range-row">
              <input id="camera-texture-gain" type="range" min="0.35" max="1.4" step="0.01" value="1" />
              <output id="camera-texture-gain-output">1.00</output>
            </div>
          </label>
        </section>

        <section class="viewer-section animation-library-section">
          <div class="animation-library-heading">
            <span class="viewer-label">Animation Library</span>
            <button id="animation-library-refresh" type="button">Refresh</button>
          </div>
          <label class="viewer-field">
            <span>Folder</span>
            <select id="animation-library-folder-select"></select>
          </label>
          <div class="animation-library-create">
            <input id="animation-library-folder-name" type="text" placeholder="character" autocomplete="off" />
            <button id="create-animation-library-folder" type="button">Create Folder</button>
          </div>
          <button id="animation-library-import-button" type="button">Import To Folder</button>
          <div class="animation-library-save-row">
            <button id="save-patch" type="button" title="Save the current cleanup edits to the current project animation file">Save</button>
            <button id="animation-library-save-as" type="button" title="Name a new cleanup file in the selected project animation folder">Save As</button>
          </div>
          <div id="animation-library-save-as-row" class="animation-library-save-as-row" hidden>
            <input id="animation-library-save-as-name" type="text" placeholder="new-loop-name" autocomplete="off" />
            <button id="animation-library-save-as-ok" type="button" title="Save as new cleanup file" aria-label="Save as new cleanup file">✓</button>
            <button id="animation-library-save-as-cancel" type="button" title="Cancel save as" aria-label="Cancel save as">×</button>
          </div>
          <input id="animation-library-file" type="file" accept=".fbx" multiple hidden />
          <div id="animation-library-list" class="animation-library-list" aria-label="Animation library files"></div>
        </section>

        <section class="viewer-section viewer-meta" aria-live="polite">
          <dl>
            <div>
              <dt>Selected</dt>
              <dd id="selection-count">0 vertices</dd>
            </div>
            <div>
              <dt>Patch</dt>
              <dd id="patch-count">0 vertices</dd>
            </div>
            <div>
              <dt>Keys</dt>
              <dd id="key-count">0 keys</dd>
            </div>
            <div>
              <dt>Model</dt>
              <dd id="clip-source">Loading</dd>
            </div>
          </dl>
          <p id="viewer-status">Loading model</p>
        </section>
      </aside>

      <section class="viewer-stage" aria-label="3D weight editor">
        <div class="animation-editor-tools" aria-label="Editor layout controls">
          <button id="side-panel-show-toggle" class="panel-show-toggle" type="button" aria-label="Show panel" title="Show panel" hidden>+</button>
          <button id="timeline-show-toggle" class="timeline-show-toggle" type="button" hidden>Timeline</button>
        </div>
        <div class="weight-viewport-tools" aria-label="Viewport tools">
          <div class="viewport-tool-group" role="group" aria-label="Edit tools">
            <button id="undo-edit" type="button" title="Undo last cleanup edit">Undo</button>
            <button id="redo-edit" type="button" title="Redo last cleanup edit">Redo</button>
            <button id="tool-pen" class="is-active" type="button" data-tool="paint" title="Paint selection">Pen</button>
            <button id="tool-neighbor" type="button" data-tool="neighbor" title="Select connected vertices from the hovered vertex">Neighbor</button>
            <button id="tool-deselect" type="button" data-tool="deselect" title="Remove painted selection only">Deselect</button>
            <button id="tool-erase" type="button" data-tool="erase" title="Erase selected vertices in 3D Edit; erase weight and vertex edits in other modes">Erase</button>
            <button id="tool-orbit" type="button" data-tool="orbit" title="Orbit camera">Orbit</button>
            <button id="tool-move" class="viewport-edit-only" type="button" data-tool="move" title="Move selected vertices with a 3D gizmo">Move</button>
            <button id="tool-pull" class="viewport-edit-only" type="button" data-tool="pull" title="Pull vertices out">Pull</button>
            <button id="tool-push" class="viewport-edit-only" type="button" data-tool="push" title="Push vertices in">Push</button>
          </div>
          <div class="viewport-tool-group viewport-mode-group" role="group" aria-label="Viewport modes">
            <button class="is-active" type="button" data-view-mode="rendered" title="Textured rendered mode">Rendered</button>
            <button type="button" data-view-mode="mesh" title="Wire mesh mode">Mesh</button>
            <button type="button" data-view-mode="edit" title="3D vertex edit mode">3D Edit</button>
            <button id="clean-preview" type="button" title="Hide selections, bones, and edit controls without clearing them">Clean Preview</button>
            <button id="mirror-mode" type="button" title="Mirror left and right wing pose keys">Mirror</button>
          </div>
        </div>
        <div id="camera-gizmo" class="camera-gizmo" aria-label="Camera gizmo">
          <div id="camera-gizmo-pad" class="camera-gizmo-pad" role="button" tabindex="0" aria-label="Drag camera orbit gizmo" title="Drag to orbit the camera">
            <button class="camera-gizmo-axis camera-gizmo-axis-y" type="button" data-camera-axis="y" title="Drag to rotate camera around the Y axis">Y</button>
            <button class="camera-gizmo-axis camera-gizmo-axis-x" type="button" data-camera-axis="x" title="Drag to rotate camera around the X axis">X</button>
            <button class="camera-gizmo-axis camera-gizmo-axis-z" type="button" data-camera-axis="z" title="Drag to roll camera around the Z axis">Z</button>
          </div>
        </div>
        <div class="weight-timeline-panel" aria-label="Keyframe posing timeline">
          <div class="timeline-pose-row">
            <div class="timeline-pose-tools">
              <div class="timeline-bone-tool-actions">
                <button id="bone-gizmo" class="timeline-bone-tool" type="button" title="Move selected bone with the FK gizmo">FK</button>
                <button id="ik-gizmo" class="timeline-bone-tool" type="button" title="Move selected chain with inverse kinematics">IK</button>
              </div>
              <div class="ik-chain-settings timeline-ik-settings" aria-label="IK chain settings">
                <label class="viewer-field">
                  <span>IK solver</span>
                  <select id="ik-solver-mode">
                    <option value="ccd">CCD</option>
                    <option value="smooth">Smooth</option>
                  </select>
                </label>
                <label class="viewer-field ik-counter-rotation-field">
                  <span title="Counter rotation">Counter</span>
                  <div class="viewer-range-row">
                    <input id="ik-counter-rotation" type="range" min="-1" max="1" step="0.05" value="0" />
                    <output id="ik-counter-rotation-output">0.00</output>
                  </div>
                </label>
              </div>
            </div>
            <div class="timeline-main-stack">
              <div class="weight-timeline-toolbar">
                <label class="timeline-bone-field timeline-toolbar-bone-field">
                  <span>Bone</span>
                  <select id="pose-bone-select"></select>
                </label>
              </div>
              <div class="timeline-transform-controls">
                <label class="timeline-rot-field">
                  <span>Rot X</span>
                  <input id="pose-rot-x" type="range" min="-1.57" max="1.57" step="0.01" value="0" />
                  <input id="pose-rot-x-value" class="timeline-value-input" type="number" min="-1.57" max="1.57" step="0.01" value="0.00" />
                </label>
                <label class="timeline-rot-field">
                  <span>Rot Y</span>
                  <input id="pose-rot-y" type="range" min="-1.57" max="1.57" step="0.01" value="0" />
                  <input id="pose-rot-y-value" class="timeline-value-input" type="number" min="-1.57" max="1.57" step="0.01" value="0.00" />
                </label>
                <label class="timeline-rot-field">
                  <span>Rot Z</span>
                  <input id="pose-rot-z" type="range" min="-1.57" max="1.57" step="0.01" value="0" />
                  <input id="pose-rot-z-value" class="timeline-value-input" type="number" min="-1.57" max="1.57" step="0.01" value="0.00" />
                </label>
                <label class="timeline-rot-field">
                  <span>Move X</span>
                  <input id="pose-pos-x" type="range" min="-30" max="30" step="0.005" value="0" />
                  <input id="pose-pos-x-value" class="timeline-value-input" type="number" min="-30" max="30" step="0.005" value="0.000" />
                </label>
                <label class="timeline-rot-field">
                  <span>Move Y</span>
                  <input id="pose-pos-y" type="range" min="-30" max="30" step="0.005" value="0" />
                  <input id="pose-pos-y-value" class="timeline-value-input" type="number" min="-30" max="30" step="0.005" value="0.000" />
                </label>
                <label class="timeline-rot-field">
                  <span>Move Z</span>
                  <input id="pose-pos-z" type="range" min="-30" max="30" step="0.005" value="0" />
                  <input id="pose-pos-z-value" class="timeline-value-input" type="number" min="-30" max="30" step="0.005" value="0.000" />
                </label>
              </div>
            </div>
            <div class="timeline-pose-actions">
              <div class="timeline-layout-actions">
                <button id="timeline-compact-toggle" type="button" aria-label="Expand timeline" title="Expand timeline" aria-pressed="true">+</button>
                <button id="timeline-hide-toggle" type="button" aria-label="Hide timeline" title="Hide timeline">-</button>
              </div>
              <button id="key-current-pose" type="button" title="Key selected bone pose">Key</button>
              <button id="loop-to-start" class="timeline-loop-action" type="button" title="Blend selected bone or chain back to frame 0 at the end">Blend Loop</button>
            </div>
          </div>
          <div class="timeline-track-row">
            <button id="timeline-play-toggle" type="button">Play</button>
            <div class="timeline-frame-readout">Frame <output id="frame-readout">0 / 96</output></div>
            <div class="timeline-track">
              <input id="timeline-scrub" type="range" min="0" max="96" step="1" value="0" />
              <div id="timeline-keys" class="timeline-keys" aria-label="Pose keyframes"></div>
            </div>
            <div class="timeline-key-actions">
              <button id="prev-key" type="button">Prev Frame</button>
              <button id="next-key" type="button">Next Frame</button>
              <button id="delete-key" type="button">Delete Key</button>
              <button id="clear-keys" type="button">Clear Keys</button>
            </div>
            <label class="timeline-hold-toggle"><input id="hold-keys-toggle" type="checkbox" /> Hold</label>
          </div>
          <div class="timeline-track-row timeline-sequence-row">
            <button id="timeline-play-both" type="button" disabled>Play Sequence</button>
            <div class="timeline-frame-readout">Sequence <output id="sequence-readout">Ready</output></div>
            <div class="timeline-track timeline-sequence-track">
              <input id="timeline-sequence-scrub" type="range" min="0" max="1000" step="1" value="0" disabled />
              <div id="sequence-phase-track" class="sequence-phase-track" aria-label="Animation sequence phases">
                <span data-sequence-phase="source"><b>Initial</b><output id="sequence-source-readout">--</output></span>
                <span data-sequence-phase="mix"><b>Mixer</b><output id="sequence-mix-readout">--</output></span>
                <span data-sequence-phase="target"><b>Second</b><output id="sequence-target-readout">--</output></span>
              </div>
            </div>
            <p class="timeline-blend-note">Initial clip, mixer blend, second clip</p>
          </div>
          <div id="bone-layer-list" class="bone-layer-list" aria-label="Bone keyframe layers"></div>
        </div>
        <div id="bone-labels" class="bone-labels" aria-hidden="true"></div>
        <canvas id="viewer-canvas"></canvas>
      </section>
    </main>
