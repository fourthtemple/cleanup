<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Fourth Temple logo</title>
  <desc id="desc">A stylized gold leaf with F and T monogram letters in the surrounding shaded spherical field.</desc>
